version: '3.8'

services:
  app:
    build: .
    container_name: excel-manager
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      # Папка data на хосте (твоём ПК) будет видна внутри контейнера как /app/data
      - ./uploads:/app/data
      # Если используешь nodemon для автоперезагрузки при изменении кода в разработке:
      # - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
